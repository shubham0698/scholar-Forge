{% extends 'base.html' %}

{% block title %}Forgot Password — ScholarForge{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Forgot Password</h2>
    <p class="text-secondary mb-3">Enter your email address to receive a password reset code.</p>
    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="you@university.edu" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Send Reset Code</button>
    </form>
    <p class="text-center mt-3 text-secondary" style="font-size: 0.88rem;">
        Remembered your password? <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>
{% endblock %}
