{% extends 'base.html' %}

{% block title %}Edit Profile — ScholarForge{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 550px;">
    <h2>Edit Profile</h2>
    <p class="text-secondary mb-3">Update your account information.</p>
    <hr>
    <form method="POST" action="{{ url_for('edit_profile') }}">
        <div class="form-group">
            <label for="username">Full Name</label>
            <input type="text" id="username" name="username" class="form-control" value="{{ user.username }}" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" value="{{ user.email }}" disabled>
            <small class="text-muted" style="font-size: 0.8rem;">Email cannot be changed.</small>
        </div>
        <div class="form-group">
            <label for="institution">College / Institution</label>
            <input type="text" id="institution" name="institution" class="form-control" value="{{ user.institution or '' }}">
        </div>
        <div class="form-group">
            <label for="department">Department</label>
            <input type="text" id="department" name="department" class="form-control" value="{{ user.department or '' }}">
        </div>
        <hr>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
            <a href="{{ url_for('profile') }}" class="btn" style="flex: 1;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
