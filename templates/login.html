{% extends 'base.html' %}

{% block title %}Login — ScholarForge{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Welcome Back</h2>
    <p class="text-secondary mb-3">Sign in to access your research dashboard.</p>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="you@university.edu" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group" style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="margin: 0;">Remember me</label>
            </div>
            <a href="{{ url_for('forgot_password') }}" style="font-size: 0.88rem; text-decoration: none;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Login</button>
    </form>
    <p class="text-center mt-3 text-secondary" style="font-size: 0.88rem;">
        Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
    </p>
</div>
{% endblock %}
