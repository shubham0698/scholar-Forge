{% extends 'base.html' %}

{% block title %}Reset Password — ScholarForge{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Reset Password</h2>
    <p class="text-secondary mb-3">Enter the code sent to <strong>{{ email }}</strong> and your new password.</p>
    <form method="POST" action="{{ url_for('reset_password', email=email) }}">
        <div class="form-group">
            <label for="otp">Reset Code (6 Digits)</label>
            <input type="text" id="otp" name="otp" class="form-control" placeholder="123456" required minlength="6" maxlength="6" pattern="\d{6}" title="Please enter exactly 6 digits" autofocus>
        </div>
        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Reset Password</button>
    </form>
    <p class="text-center mt-3 text-secondary" style="font-size: 0.88rem;">
        <a href="{{ url_for('login') }}">Back to Login</a>
    </p>
</div>
{% endblock %}
